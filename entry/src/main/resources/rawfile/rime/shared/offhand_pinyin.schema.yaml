# Rime schema
# encoding: utf-8

schema:
  schema_id: offhand_pinyin
  name: Offhand Pinyin
  version: '0.8'
  author:
    - Offhand IME
  description: |
    Offhand 的中文拼音方案，基于 luna_pinyin 词典与语法配置，
    额外挂载应用自定义短语词库。词典已预先转换为简体，
    故不再依赖 opencc 与 simplifier 滤镜。

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: ascii_punct
    states: [ 。，, ．， ]
  - name: emoji_suggestion
    reset: 1
    states: [ 关Emoji, 开Emoji ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    __patch:
      - pinyin:/abbreviation
      - pinyin:/spelling_correction
      - pinyin:/key_correction

translator:
  dictionary: offhand_pinyin
  prism: offhand_pinyin
  user_dict: offhand_pinyin
  enable_sentence: true
  enable_completion: true
  enable_user_dict: true
  initial_quality: 1.2
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/

punctuator:
  import_preset: default

key_binder:
  import_preset: default

recognizer:
  import_preset: default

__patch:
  - offhand_pinyin.custom:/patch?
